name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on PR branches when new commits are pushed.
# Never cancel on main — every push to main must be fully verified.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────
  # Runs first. All other heavy jobs require this to pass so a trivial
  # style error doesn't waste minutes of test/build time.
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Check lockfile is current
        run: uv lock --check
      - name: Ruff — lint
        run: uv run ruff check .
      - name: Ruff — format
        run: uv run ruff format --diff .

  # ── Type check ───────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --extra dev
      - name: mypy
        run: uv run mypy myelin/

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --extra dev
      - name: pytest
        run: uv run pytest -q --tb=short --cov=myelin --cov-report=term-missing

  # ── Build ─────────────────────────────────────────────────────────────────
  # Verifies the package builds cleanly and uploads the artifacts so the
  # release workflow can inspect exactly what would be shipped.
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Build wheel and sdist
        run: uv build
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Security ──────────────────────────────────────────────────────────────
  # Scans dependency changes in PRs for known vulnerabilities (OSV database).
  # Only runs on PRs — there are no new dependency changes on direct pushes.
  security:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
