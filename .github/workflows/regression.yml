name: Regression

on:
  push:
    branches: [main]
    paths:
      - "myelin/**"
      - "benchmarks/regression/**"
  # Called by publish.yml on tag push (full=true) and by manual workflow_dispatch.
  workflow_call:
    inputs:
      full:
        description: "Run full benchmark suite (release mode — ~60 min)"
        type: boolean
        default: false
  # Manual trigger for running smoke or full regression on demand.
  workflow_dispatch:
    inputs:
      full:
        description: "Run full benchmark suite"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  regression:
    name: Regression gate
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # No if: condition needed. The path filter on the push trigger already
    # prevents smoke from firing on release commits (which only touch
    # pyproject.toml/CHANGELOG.md, not myelin/** or benchmarks/regression/**).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      # Cache HuggingFace models (sentence-transformers + cross-encoder).
      # Key tracks config.py so a model name change invalidates the cache.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('myelin/config.py') }}
          restore-keys: hf-models-

      # Cache LongMemEval data. Key tracks the download script so a source
      # change forces a fresh download.
      - name: Cache LongMemEval data
        id: lme-cache
        uses: actions/cache@v4
        with:
          path: benchmarks/longmemeval/data
          key: lme-data-${{ hashFiles('benchmarks/longmemeval/download_data.sh') }}

      - name: Download LongMemEval data
        if: steps.lme-cache.outputs.cache-hit != 'true'
        run: bash benchmarks/longmemeval/download_data.sh

      # Cache LoCoMo data (snap-research/locomo on GitHub).
      - name: Cache LoCoMo data
        id: locomo-cache
        uses: actions/cache@v4
        with:
          path: benchmarks/locomo/data
          key: locomo-data-${{ hashFiles('benchmarks/locomo/download_data.sh') }}

      - name: Download LoCoMo data
        if: steps.locomo-cache.outputs.cache-hit != 'true'
        run: bash benchmarks/locomo/download_data.sh

      # Rolling baseline cache: unique key per commit means it never hits on
      # a fresh push, but restore-keys fall back to the most recent prior
      # entry — giving a stable rolling baseline without extra storage.
      - name: Restore regression baseline
        id: baseline
        uses: actions/cache/restore@v4
        with:
          path: benchmarks/regression/baseline
          key: regression-baseline-v1-${{ github.sha }}
          restore-keys: |
            regression-baseline-v1-

      - name: Run regression check (or create initial baseline)
        run: |
          FULL_FLAG=""
          if [[ "${{ inputs.full }}" == "true" ]]; then
            FULL_FLAG="--full"
          fi
          if [ -f benchmarks/regression/baseline/lme_scores.json ]; then
            echo "Baseline found — running regression check"
            uv run python -m benchmarks.regression.run $FULL_FLAG
          else
            echo "No baseline found — creating initial baseline for next run"
            uv run python -m benchmarks.regression.run --create-baseline $FULL_FLAG
          fi

      # Only save a new baseline when the run passes so a regression on
      # commit N doesn't silently become the new baseline.
      - name: Save regression baseline
        if: success()
        uses: actions/cache/save@v4
        with:
          path: benchmarks/regression/baseline
          key: regression-baseline-v1-${{ github.sha }}
