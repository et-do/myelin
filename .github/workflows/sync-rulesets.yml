name: Sync branch rulesets

# Applies *-protection.json files to GitHub whenever they change on main.
# Requires RELEASE_TOKEN (fine-grained PAT with administration: write) because
# the GitHub Rulesets API is not accessible via GITHUB_TOKEN permissions.
on:
  push:
    branches: [main]
    paths:
      - '.github/*-protection.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  apply:
    name: Apply rulesets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply rulesets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: .github/apply-rulesets.sh
