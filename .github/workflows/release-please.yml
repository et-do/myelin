name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Accumulates conventional commits, keeps a Release PR open, and creates a
  # GitHub Release + tag when the Release PR is merged.
  # PyPI publish is handled separately by publish.yml, triggered by the tag.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
